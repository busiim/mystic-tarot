<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mystic Tarot Master</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Nanum+Myeongjo:wght@400;700;800&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MysticTarot">
<link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
    <button id="sound-toggle" onclick="toggleSound()">🔊</button>
    <button id="lang-toggle" onclick="toggleLang()">EN</button>

    <div class="mystic-bg">
        <div class="stars"></div>
        <div class="nebula"></div>
    </div>

    <div id="category-screen" class="screen">
        <header>
            <h1 id="main-title">어떤 운세가 궁금하신가요?</h1>
            <p id="main-subtitle" class="subtitle">오늘 당신의 길잡이가 되어드릴 주제를 선택하세요.</p>
        </header>
        <div class="category-grid">
            <!-- Populated by applyStrings() -->
        </div>
        <button id="today-toggle-btn" onclick="toggleTodayPanel()"></button>
    </div>

    <div id="meditation-screen" class="screen hidden">
        <div class="meditation-content">
            <div class="breathing-circle"></div>
            <h2 id="meditation-text">마음을 정돈하세요.</h2>
            <p id="selected-cat-desc" class="subtitle"></p>
        </div>
    </div>

    <div id="main-app" class="app-wrapper hidden">
        <header>
            <div class="main-title">
                <h1 id="dynamic-title">오늘의 타로 메시지</h1>
            </div>
            <p id="card-subtitle" class="subtitle">신중하게 카드를 터치하여 운명을 확인하세요.</p>
        </header>

        <!-- 단계 1: 카드 팬 선택 -->
        <div id="fan-phase">
            <p id="fan-prompt"></p>
            <div id="fan-container"></div>
            <div id="fan-controls">
                <button id="shuffle-btn" onclick="shuffleCard()"></button>
            </div>
        </div>

        <!-- 단계 2: 카드 공개 -->
        <div id="reveal-phase" class="hidden">
            <main class="scene">
                <div class="card" id="tarot-card" onclick="handleCardClick()">
                    <div class="card-inner">
                        <div class="card-front">
                            <div class="mystic-circle"></div>
                        </div>
                        <div class="card-back" id="capture-area">
                            <div id="card-image-placeholder"></div>
                            <div class="card-info-area">
                                <h2 id="card-name">CARD NAME</h2>
                                <div id="direction-badge">
                                    <span id="card-direction">READY</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- 오늘의 타로 모달 -->
    <div id="today-modal" class="hidden">
        <div class="today-modal-box">
            <div class="today-modal-header">
                <h3 id="today-modal-title"></h3>
                <button class="today-modal-close" onclick="toggleTodayPanel()">✕</button>
            </div>
            <div id="today-grid"></div>
        </div>
    </div>

    <div id="result-overlay" class="hidden">
        <div class="result-box">
            <h3 id="result-title">마스터의 조언</h3>
            <div id="card-meaning-scroll">
                <p id="card-meaning"></p>
            </div>
            <button class="retry-btn" onclick="closeOverlay()">카드 감상하기</button>
            <button class="reset-btn" onclick="startAgain()">다시 시작하기</button>
        </div>
    </div>

    <script src="majorCards.js"></script>
    <script src="cupCards.js"></script>
    <script src="swordCards.js"></script>
    <script src="wandCards.js"></script>
    <script src="pentacleCards.js"></script>
    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }
    </script>
</body>
</html>
